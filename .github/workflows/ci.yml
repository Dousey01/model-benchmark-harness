name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test-and-smoke:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e .[dev]

      - name: Unit tests
        run: pytest -q

      - name: Offline smoke benchmark
        run: mbh --prompts benchmarks/prompts.yaml --outdir out --max-prompts 3 --offline

      - name: Upload smoke artifacts
        uses: actions/upload-artifact@v4
        with:
          name: benchmark-smoke-artifacts
          path: out/
